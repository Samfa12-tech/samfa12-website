name: Deploy Samfa12 portal

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Prepare static site
        run: |
          mkdir -p _site
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.codex-remote-attachments' \
            --exclude='.wrangler' \
            --exclude='_site' \
            --exclude='/artifacts/' \
            --exclude='/tests/' \
            --exclude='/scripts/' \
            --exclude='/workers/' \
            --exclude='**/docs/' \
            --exclude='**/tests/' \
            --exclude='**/scripts/' \
            --exclude='**/README.md' \
            --exclude='**/package.json' \
            --exclude='**/package-lock.json' \
            --exclude='/AGENTS.md' \
            --exclude='/.gitignore' \
            --exclude='/qa-*.png' \
            ./ _site/
      - name: Upload site
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
